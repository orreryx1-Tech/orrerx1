<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — Orrery</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090b;--bg2:#111116;--bg3:#18181f;--txt:#f0f0ec;--txt2:#b0b0aa;--txt3:#666670;--brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.13);--grn:#3ab860;--gld:#d4a843;--red:#e03836;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg2);border:1px solid var(--brd2);border-radius:8px;padding:36px 32px;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:28px}
.logo-name{font:700 16px/1 var(--mono);color:var(--txt);letter-spacing:.04em}
h1{font:700 20px/1.2 var(--mono);margin-bottom:6px}
.sub{font:400 13px/1.6 var(--sans);color:var(--txt3);margin-bottom:24px}
.lbl{font:700 8px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);display:block;margin-bottom:5px}
input{width:100%;background:var(--bg3);border:1px solid var(--brd2);border-radius:4px;color:var(--txt);font:400 13px/1 var(--sans);padding:11px 12px;outline:none;margin-bottom:14px;transition:border .15s}
input:focus{border-color:rgba(255,255,255,.3)}
input::placeholder{color:var(--txt3)}
.btn{width:100%;background:var(--txt);border:none;border-radius:4px;color:var(--bg);font:700 10px/1 var(--mono);letter-spacing:.07em;padding:13px;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.86}
.btn:disabled{opacity:.35;cursor:not-allowed}
.msg{font:400 11px/1.5 var(--mono);margin-top:12px;padding:10px 12px;border-radius:3px;display:none}
.msg.ok{background:rgba(58,184,96,.1);border:1px solid rgba(58,184,96,.3);color:var(--grn)}
.msg.err{background:rgba(224,56,54,.1);border:1px solid rgba(224,56,54,.3);color:var(--red)}
.plan-row{display:flex;gap:6px;margin-bottom:16px}
.plan-btn{flex:1;padding:8px 6px;border-radius:3px;border:1px solid var(--brd2);background:transparent;color:var(--txt3);font:600 8px/1 var(--mono);letter-spacing:.06em;cursor:pointer;transition:all .15s;text-align:center}
.plan-btn.active{background:var(--txt);color:var(--bg);border-color:var(--txt)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 32 32"><rect width="32" height="32" rx="4" fill="#f0f0ec"/><ellipse cx="16" cy="16" rx="10" ry="4" fill="none" stroke="#09090a" stroke-width="1" transform="rotate(-30,16,16)"/><ellipse cx="16" cy="16" rx="6.5" ry="2.5" fill="none" stroke="rgba(9,9,10,0.4)" stroke-width=".8" stroke-dasharray="3 2" transform="rotate(-30,16,16)"/><circle cx="16" cy="16" r="2" fill="#09090a"/><circle cx="23" cy="11" r="1.5" fill="#09090a"/><circle cx="12" cy="20" r="1" fill="#e03836"/></svg>
    <div class="logo-name">Orrery</div>
  </div>
  <h1>Get Access</h1>
  <p class="sub">Enter your email to receive a magic sign-in link.</p>

  <div class="plan-row" id="plan-row">
    <button class="plan-btn active" onclick="setPlan('s',this)">Starter $0.99</button>
    <button class="plan-btn" onclick="setPlan('a',this)">Analyst $14.99</button>
    <button class="plan-btn" onclick="setPlan('c',this)">Command $34.99</button>
  </div>

  <label class="lbl">Email Address</label>
  <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')send()">
  <button class="btn" id="btn" onclick="send()">SEND MAGIC LINK →</button>
  <div class="msg" id="msg"></div>
</div>
<script>
  var plan = new URLSearchParams(location.search).get('plan') || 's';
  function setPlan(p, el) {
    plan = p;
    document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
  // Pre-select plan from URL
  var btns = document.querySelectorAll('.plan-btn');
  if(plan==='a') btns[1].click();
  if(plan==='c') btns[2].click();

  async function send() {
    var email = document.getElementById('email').value.trim();
    var btn = document.getElementById('btn');
    var msg = document.getElementById('msg');
    if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      msg.className='msg err'; msg.style.display='block'; msg.textContent='Please enter a valid email address.'; return;
    }
    btn.disabled=true; btn.textContent='SENDING…';
    try {
      var r = await fetch('/api/send-magic', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, plan })
      });
      var d = await r.json();
      if(d.success) {
        msg.className='msg ok'; msg.style.display='block';
        msg.textContent='✓ Magic link sent! Check your email — expires in 15 minutes.';
        btn.textContent='SENT ✓';
      } else {
        throw new Error(d.error || 'Failed to send');
      }
    } catch(e) {
      msg.className='msg err'; msg.style.display='block'; msg.textContent='Error: '+e.message;
      btn.disabled=false; btn.textContent='SEND MAGIC LINK →';
    }
  }
</script>
</body>
</html>
